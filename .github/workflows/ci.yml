name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check inspector tests
      - name: Unit tests
        run: pytest -q
      - name: doctor smoke (detector key only; E2B optional)
        env:
          REPLICATE_API_TOKEN: dummy-ci-token
        run: inspector-mcp doctor
      - name: MCP inspect smoke
        run: fastmcp inspect mcp_server.py:mcp

  build:
    name: build + fresh install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Install the built wheel in a clean venv and run doctor
        run: |
          python -m venv /tmp/fresh
          /tmp/fresh/bin/pip install dist/*.whl
          REPLICATE_API_TOKEN=dummy /tmp/fresh/bin/inspector-mcp doctor
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  lock:
    name: uv.lock in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Verify uv.lock matches pyproject
        run: uv lock --locked
