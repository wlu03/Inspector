<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sample Buggy Counter</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; padding: 32px; color: #1a1a1a; }
      h1 { font-size: 20px; }
      .panel { border: 1px solid #ddd; border-radius: 10px; padding: 24px; margin: 16px 0; max-width: 420px; }
      #count { font-size: 48px; font-weight: 700; margin: 8px 0 20px; }
      button { font-size: 15px; padding: 8px 16px; margin-right: 8px; border-radius: 8px;
               border: 1px solid #bbb; background: #f6f6f6; cursor: pointer; }
      .row { display: flex; align-items: center; gap: 12px; }
    </style>
  </head>
  <body>
    <h1>Counter</h1>
    <div class="panel">
      <div>Current count:</div>
      <div id="count">0</div>
      <button id="minus">Minus</button>
      <button id="plus">Plus</button>
      <button id="reset">Reset</button>
    </div>

    <div class="panel">
      <div class="row">
        <span>Notifications</span>
        <button id="notif" aria-pressed="false">Off</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
