plugins {
    id 'com.android.application'
}

android {
    namespace 'com.inspector.sample'
    compileSdk 34

    defaultConfig {
        applicationId "com.inspector.sample"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        debug {
            // plain debug build — no signing config needed for assembleDebug
        }
    }
}
