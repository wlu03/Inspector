site_name: Inspector
site_description: An MCP server that lets a coding agent see, operate, and test the app it built.
repo_url: https://github.com/wlu03/Inspector
docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
    - navigation.top
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences

nav:
  - Home: index.md
  - Overview & Strategy: 01-vision-and-strategy.md
  - Architecture: 02-architecture.md
  - MCP Contract: 03-mcp-contract.md
  - Tool Reference: tool-reference.md
  - Execution Planes: execution-planes.md
  - Core Loop: 04-core-loop.md
  - Detection & Feedback: 05-detection-and-feedback.md
  - Data Schema: 06-data-schema.md
  - Dashboard: 07-dashboard.md
  - Roadmap: 08-roadmap.md
  - Risks & Open Questions: 09-risks-and-open-questions.md
  - Research Notes: 10-research-notes.md
  - Implementation Steps: 11-implementation-steps.md
  - Accounts & Services: 12-accounts-and-services.md
  - Agentic Test Loop: 13-agentic-test-loop.md
  - iOS/macOS Adapter Plan: 14-ios-macos-adapter-plan.md
  - Multi-Agent Bug Finding: 15-multi-agent-bug-finding.md
  - Devin Integration: 16-devin-integration.md
